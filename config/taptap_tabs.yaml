  - id: b05
    label: my_games
    point: "90%, 96%"
    top_tabs:
      - { id: t01, label: local, text: "本机", point: "8%, 12%", profile: light_tab }
      - { id: t02, label: cloud_play, text: "云玩", point: "22%, 12%", profile: light_tab }
      - { id: t03, label: reserve, text: "预约", point: "36%, 12%", profile: light_tab }
      - { id: t04, label: wish, text: "心愿单", point: "50%, 12%", profile: light_tab }
      - { id: t05, label: history, text: "历史", point: "65%, 12%", profile: light_tab }
      - { id: t06, label: update_mgr, text: "更新", point: "80%, 12%", profile: light_tab }

# === 滑动安全区 ===
#   所有 feed 下滑 / scroll_to_top 仅在 y=26%~46% 区域，避免误触底部 tab 栏（~96%）

top_bar_swipes:
  left:
    start: "82%, 12%"
    end: "18%, 12%"
    duration: 280
  left2:
    start: "82%, 12%"
    end: "18%, 12%"
    duration: 280
  reset:
    start: "18%, 12%"
    end: "82%, 12%"
    duration: 280

# 列表下滑 — 只在屏幕中上部滑动（y 24%~42%），远离底部 tab 栏 ~96%
feed_swipe:
  start: "50%, 42%"
  end: "50%, 24%"
  duration: 240

# 滑回顶部 — 手指下移，内容回顶；可 repeat 多次（榜单从150回顶）
scroll_to_top:
  start: "50%, 28%"
  end: "50%, 40%"
  duration: 240

# 游戏详情页左上角返回（系统 BACK 键通常无效）
ui_points:
  back: "6%, 13%"
