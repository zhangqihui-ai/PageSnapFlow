# 站酷 Zcool - home feed browse
# Package: adb shell pm list packages | findstr -i zcool

appId: com.zcool.community

---
- launchApp
- runFlow:
    label: Dismiss permissions
    commands:
      - tapOn: { text: "Allow", optional: true }
      - tapOn: { text: "允许", optional: true }
- runFlow:
    label: Dismiss dialogs
    commands:
      - tapOn: { text: "Skip", optional: true }
      - tapOn: { text: "跳过", optional: true }
      - tapOn: { text: "Close", optional: true }
      - tapOn: { text: "关闭", optional: true }
- takeScreenshot: 01_home

- swipe:
    start: 50%, 80%
    end: 50%, 20%
- takeScreenshot: 02_feed_swipe_1

- swipe:
    start: 50%, 80%
    end: 50%, 20%
- takeScreenshot: 03_feed_swipe_2

- tapOn:
    text: "发现"
    optional: true
- takeScreenshot: 04_discover

- tapOn:
    text: "关注"
    optional: true
- takeScreenshot: 05_following

- tapOn:
    text: "推荐"
    optional: true
- takeScreenshot: 06_recommend

- tapOn:
    point: 50%, 40%
    optional: true
- takeScreenshot: 07_detail

- back
- takeScreenshot: 08_back
