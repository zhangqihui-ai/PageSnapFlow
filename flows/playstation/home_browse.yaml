# PlayStation App - store / library tabs
# Package: adb shell pm list packages | findstr -i psx

appId: com.scee.psxandroid

---
- launchApp
- runFlow:
    label: Dismiss permissions
    commands:
      - tapOn: { text: "Allow", optional: true }
      - tapOn: { text: "允许", optional: true }
- runFlow:
    label: Dismiss dialogs
    commands:
      - tapOn: { text: "Skip", optional: true }
      - tapOn: { text: "跳过", optional: true }
      - tapOn: { text: "Close", optional: true }
      - tapOn: { text: "关闭", optional: true }
- takeScreenshot: 01_home

- tapOn:
    text: "Store"
    optional: true
- takeScreenshot: 02_store

- swipe:
    start: 50%, 80%
    end: 50%, 20%
- takeScreenshot: 03_store_swipe

- tapOn:
    text: "Library"
    optional: true
- takeScreenshot: 04_library

- tapOn:
    text: "Search"
    optional: true
- takeScreenshot: 05_search

- tapOn:
    text: "Settings"
    optional: true
- takeScreenshot: 06_settings

- back
- takeScreenshot: 07_back
