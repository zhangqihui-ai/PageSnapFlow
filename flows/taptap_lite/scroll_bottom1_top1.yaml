# TapTap scroll: 找游戏 + 推荐
# 100 screenshots per run (1 start + 99 swipes). Speed-first; filter manually.

appId: com.taptap

---
- runFlow: ../common/ensure_taptap_ready.yaml

- runFlow:
    label: Dismiss dialogs if shown
    commands:
      - tapOn: { text: "允许", optional: true }
      - tapOn: { text: "跳过", optional: true }
      - tapOn: { text: "关闭", optional: true }
      - tapOn: { text: "以后再说", optional: true }

- tapOn:
    point: "10%, 96%"
- waitForAnimationToEnd:
    timeout: 300

- tapOn:
    text: "推荐"
    optional: true
- tapOn:
    point: "8%, 12%"
    optional: true
- waitForAnimationToEnd:
    timeout: 300

- swipe:
    start: 50%, 38%
    end: 50%, 68%
    duration: 200

- takeScreenshot: b1t1_00_start

- evalScript: ${output.n = 0}
- repeat:
    times: 99
    commands:
      - swipe:
          start: 50%, 58%
          end: 50%, 32%
          duration: 200
      - evalScript: ${output.n = output.n + 1}
      - takeScreenshot: ${'b1t1_' + output.n}
